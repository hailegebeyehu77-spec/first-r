<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p id="demo">adult</p>
    <!--while loop is used to repeat the process until the user enters the correct username and password-->
    <script>
      let loggedIn = false;
      let username;
      let password;
      while (!loggedIn) {
        username = prompt("enter your username"); //while is used to repeat the process until the user enters the correct username and password
        password = prompt("enter your password");
        if (username === "haile" && password == "1111") {
          loggedIn = true;
          document.getElementById("demo").innerHTML = "welcome " + username;
        } else {
          document.getElementById("demo").innerHTML =
            "wrong username or password";
        }
      }
    </script>
    <!--for loop = repeat some code a limited number of times-->
    <script>
      for (let i = 0; i < 5; i++) {
        console.log("hello"); //the for loop will execute the code block 5 times, and the value of i will be incremented by 1 in each iteration
      } //the result will be "hello" printed 5 times in the console
    </script>
  </body>
</html>
