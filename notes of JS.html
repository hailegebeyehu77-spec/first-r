    <!--arguments-->
    <script>
      function sum() {
        let total = 0;
        for (let i = 0; i < arguments.length; i++) {
          total += arguments[i];
        }
        return total;
      }
      document.getElementById("demo").innerHTML = sum(1, 2, 3, 4, 5); //the result is "15" because the sum() function uses the arguments object to iterate through all the arguments passed to the function and adds them together. In this case, it sums 1 + 2 + 3 + 4 + 5, which equals 15, and then returns that total.
    </script>
    <script>
      function findMax() {
        let max = -Infinity;
        for (let i = 0; i < arguments.length; i++) {
          if (arguments[i] > max) {
            max = arguments[i];
          }
        }
        return max;
      }
      document.getElementById("demo").innerHTML = findMax(4, 5, 6); //the result is "6" because the findMax() function iterates through all the arguments passed to it and keeps track of the maximum value found. In this case, it compares 4, 5, and 6, and determines that 6 is the largest number, which is then returned and displayed in the element with id "demo"
    </script>

    <script>
      // Function Declaration (hoisted)
      function greet(name) {
        return `Hello, ${name}!`;
      }
      document.getElementById("demo").innerHTML = greet(); // its scope. This means that the function can be called before it is defined in the code, allowing us to log the greeting for "Alice" without any issues.
    </script>
    <script>
      const factorial = function fact(n) {
        if (n <= 1) return 1;
        return n * fact(n - 1); // Can use the name inside
      };
      console.log(factorial(5)); // 120
      // fact(5) // Error! fact is not defined outside
      //the result is "120" because the factorial variable is assigned an anonymous function that calculates the factorial of a number n. The function uses recursion by calling itself with n - 1 until it reaches the base case where n is less than or equal to 1, at which point it returns 1. When we call factorial(5), it computes 5 * 4 * 3 * 2 * 1, resulting in 120. The name "fact" is only accessible within the function itself and cannot be called from outside, which is why calling fact(5) would result in an error.
    </script>
    <script>
      let sum = add(1, 3); //in function declaration, the function is hoisted to the top of its scope, allowing us to call it before it is defined in the code. This means that we can calculate the sum of 1 and 3 using the add() function without any issues, even though the function is defined after the call to add(1, 3).
      function add(a, b) {
        return a + b;
      }
      document.getElementById("demo").innerHTML = sum; //the result is "4" because the add() function is a function declaration, which is hoisted to the top of its scope. This means that the function can be called before it is defined in the code, allowing us to calculate the sum of 1 and 3 without any issues.
    </script>
    <script>
      let sum1 = addd(2, 4); //the result is "TypeError: addd is not a function" because the addd variable is assigned a function expression, which is not hoisted. This means that the function cannot be called before it is defined in the code. Since we are trying to call addd(2, 4) before the function expression is assigned to the addd variable, it results in a TypeError indicating that addd is not a function.
      const addd = function (a, b) {
        return a + b;
      };
      document.getElementById("demo").innerHTML = sum1;
    </script>

    <!--Tracking Objects-->
    <!--A WeakSet is similar to a Set, but it only stores objects, and holds them weakly. If there are no other references to an object, it gets garbage collected automatically.

     This makes it handy for tracking objects without storing extra data (like counts).-->
    <script>
      let teexxt = "";
      //create WeakSet to track persons
      const peerssons = new WeakSet();
      //create visitor objects
      const john = { name: "john", age: 22 };
      const haile = { name: "haile", age: 32 };
      const paul = { name: "paul", age: 21 };
      const ringo = { name: "ringo", age: 23 };
      //Track visits

      track(haile);
      track(paul);
      track(john);
      track(haile);
      //Function to track visitors
      function track(visitor) {
        if (peerssons.has(visitor)) {
          teexxt += visitor.name + "is visiting again.<br>";
        } else {
          teexxt +=
            visitor.name +
            ",age" +
            visitor.age +
            ",is visiting the first time.<br>";
        }
      }
      document.getElementById("demo").innerHTML = teexxt;
    </script>
