<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ADDIS SPA - Spa Accessory Importer & Worker in Ethiopia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- React and Babel CDN -->
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
        color: #222;
      }
      nav {
        background: #2d3e50;
        padding: 1em 0;
        text-align: center;
      }
      nav a {
        color: #fff;
        text-decoration: none;
        margin: 0 1.5em;
        font-size: 1.1em;
        transition:
          color 0.3s,
          text-decoration 0.3s;
        position: relative;
      }
      nav a:hover,
      nav a.active {
        color: #ffb347;
        text-decoration: underline;
      }
      .container {
        max-width: 900px;
        margin: 2em auto;
        background: #fff;
        padding: 2em;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      }
      h1,
      h2 {
        color: #2d3e50;
      }
      button {
        background: #ffb347;
        color: #fff;
        border: none;
        padding: 0.7em 1.5em;
        border-radius: 4px;
        font-size: 1em;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 1em;
      }
      button:hover {
        background: #e09e3e;
      }
      .contact-form input,
      .contact-form textarea {
        width: 100%;
        padding: 0.7em;
        margin: 0.5em 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1em;
      }
      .contact-form label {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;

      function Navigation({ current, onNavigate }) {
        const links = [
          { name: "Home", key: "home" },
          { name: "About", key: "about" },
          { name: "Service", key: "service" },
          { name: "Contact", key: "contact" },
        ];
        return (
          <nav>
            {links.map((link) => (
              <a
                key={link.key}
                href="#"
                className={current === link.key ? "active" : ""}
                onClick={(e) => {
                  e.preventDefault();
                  onNavigate(link.key);
                }}
              >
                {link.name}
              </a>
            ))}
          </nav>
        );
      }

      function Home() {
        return (
          <div>
            <h1>Welcome to ADDIS SPA</h1>
            <p>
              Your trusted spa accessory importer and worker in Ethiopia. We
              provide high-quality spa products and professional services to
              elevate your wellness experience.
            </p>
            <button onClick={() => alert("Explore our services below!")}>
              Explore Services
            </button>
          </div>
        );
      }

      function About() {
        return (
          <div>
            <h2>About Us</h2>
            <p>
              ADDIS SPA is a leading importer and worker of spa accessories in
              Ethiopia. With years of experience, we are dedicated to bringing
              the best products and services to our clients, ensuring relaxation
              and rejuvenation.
            </p>
          </div>
        );
      }

      function Service() {
        return (
          <div>
            <h2>Our Services</h2>
            <ul>
              <li>Importing premium spa accessories</li>
              <li>Spa equipment installation</li>
              <li>Maintenance and repair services</li>
              <li>Consultation for spa businesses</li>
            </ul>
            <button onClick={() => alert("Contact us for more details!")}>
              Get a Quote
            </button>
          </div>
        );
      }

      function Contact() {
        const [form, setForm] = useState({ name: "", email: "", message: "" });
        const [submitted, setSubmitted] = useState(false);

        function handleChange(e) {
          setForm({ ...form, [e.target.name]: e.target.value });
        }

        function handleSubmit(e) {
          e.preventDefault();
          setSubmitted(true);
        }

        return (
          <div>
            <h2>Contact Us</h2>
            {submitted ? (
              <p>
                Thank you for contacting us, {form.name}! We will get back to
                you soon.
              </p>
            ) : (
              <form className="contact-form" onSubmit={handleSubmit}>
                <label>Name:</label>
                <input
                  type="text"
                  name="name"
                  value={form.name}
                  onChange={handleChange}
                  required
                />
                <label>Email:</label>
                <input
                  type="email"
                  name="email"
                  value={form.email}
                  onChange={handleChange}
                  required
                />
                <label>Message:</label>
                <textarea
                  name="message"
                  value={form.message}
                  onChange={handleChange}
                  required
                />
                <button type="submit">Send Message</button>
              </form>
            )}
          </div>
        );
      }

      function App() {
        const [page, setPage] = useState("home");
        let content;
        if (page === "home") content = <Home />;
        else if (page === "about") content = <About />;
        else if (page === "service") content = <Service />;
        else if (page === "contact") content = <Contact />;

        return (
          <div>
            <Navigation current={page} onNavigate={setPage} />
            <div className="container">{content}</div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
